{% extends "base.html" %}
{% load static i18n %}

{% block page_title %}{% trans "任務列表" %}{% endblock %}

{% block content %}
<div class="d-flex justify-content-end mb-4">
  <a href="{% url 'task_settings' %}" class="btn btn-gradient d-flex align-items-center gap-2" style="text-decoration: none;">
    <i class="ph ph-plus-circle" style="font-size: 1.2rem;"></i> {% trans "建立新任務" %}
  </a>
</div>
<div class="row g-4" id="taskGrid">
  <div class="col-12 text-center py-5">
    <div class="spinner-border" style="color: var(--accent-secondary);" role="status"></div>
      <p class="mt-3 text-muted">{% trans "系統啟動中..." %}</p>
  </div>
</div>

<!-- Toast for Notifications -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="actionToast" class="toast glass-card" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header"
      style="background: transparent; color: var(--text-primary); border-bottom: 1px solid var(--border-glass);">
      <i class="ph-fill ph-check-circle" style="color: var(--success); margin-right: 8px;"></i>
      <strong class="me-auto" id="toastTitle">{% trans "成功" %}</strong>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body" id="toastMessage">
      {% trans "操作已完成。" %}
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/dashboard.js' %}"></script>
{% endblock %}
