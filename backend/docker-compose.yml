version: '3.8'

services:
  # 1. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: crawler-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-crawler_db}
      POSTGRES_USER: ${DB_USER:-crawler_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crawler_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crawler_user} -d ${DB_NAME:-crawler_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis (Broker & Cache)
  redis:
    image: redis:7-alpine
    container_name: crawler-redis
    volumes:
      - redisdata:/data

  # 3. Django Web Application
  app:
    build: .
    container_name: crawler-django
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DEBUG=False
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
    command: sh -c "echo '>>> Waiting for DB/Redis...' && sleep 10 && python manage.py migrate && python manage.py collectstatic --noinput && python force_seed.py && gunicorn config.wsgi:application --bind 0.0.0.0:8000"

  # 4. Celery Worker (Handles tasks)
  worker:
    build: .
    container_name: crawler-worker
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: celery -A config worker -l info --pool=solo

  # 5. Celery Beat (Scheduled tasks)
  beat:
    build: .
    container_name: crawler-beat
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # 6. Nginx Reverse Proxy (Frontend entry)
  nginx:
    image: nginx:stable-alpine
    container_name: crawler-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/django.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
    depends_on:
      - app

volumes:
  pgdata:
  redisdata:
